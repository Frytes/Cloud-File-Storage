name: CI/CD Pipeline (Cloud Build -> Local Deploy)

on:
  push:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Run All Tests
        run: ./mvnw verify

  deploy:
    needs: tests
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build JAR (Skip Tests)
        run: ./mvnw clean package -DskipTests

      - name: Docker Compose Up
        run: |
          docker compose down --remove-orphans
          docker compose up -d --build
          docker image prune -f