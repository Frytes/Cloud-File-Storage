name: CI/CD Pipeline (Local Build & Deploy)

on:
  push:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Run All Tests
        run: ./mvnw verify

  deploy:
    needs: tests
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build JAR (Skip Tests)
        run: ./mvnw clean package -DskipTests

      - name: Create .env file
        run: |
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}" >> .env
          echo "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}" >> .env
          echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}" >> .env
          echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" >> .env
          echo "MINIO_URL=${{ secrets.MINIO_URL }}" >> .env
          echo "MINIO_EXTERNAL_URL=${{ secrets.MINIO_EXTERNAL_URL }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env

      - name: Docker Compose Up
        run: |
          docker compose down --remove-orphans
          docker compose up -d --build
          docker image prune -f

      - name: Wait for Spring Boot to start
        run: sleep 20

      - name: Run E2E Tests
        run: ./mvnw test -Dtest=*E2ETest

      - name: Auto-Rollback on E2E Failure
        if: failure()
        run: |
            git checkout HEAD~1
            ./mvnw clean package -DskipTests
            docker compose down --remove-orphans
            docker compose up -d --build
