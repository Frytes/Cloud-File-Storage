server:
  forward-headers-strategy: framework
spring:
  application:
    name: CloudStorage
  tomcat:
    max-parameters: 10000
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB

  datasource:
    url: jdbc:postgresql://localhost:5432/cloud_storage
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 10
      connection-timeout: 30000

  session:
    store-type: redis
    timeout: 30m
    redis:
      namespace: spring:session

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    baseline-on-migrate: true

  rabbitmq:
    host: localhost
    port: 5672
    stomp:
      host: localhost
      port: 61613
    listener:
      simple:
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
    username: guest
    password: guest

minio:
  url: http://localhost:9000
  external-url: ${MINIO_EXTERNAL_URL:http://localhost:9000}
  access-key: minioadmin
  secret-key: minioadmin
  buckets:
    user-files: user-files
    temp-archives: temp-archives

app:
  upload:
    max-files-per-request: 10000