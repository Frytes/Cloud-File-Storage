version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloud-storage-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cloud_storage
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      TZ: Europe/Moscow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: 'redis:alpine'
    container_name: cloud_storage_redis
    ports:
      - '6379:6379'
    command: redis-server --protected-mode no
    environment:
      TZ: Europe/Moscow
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: always

  backend:
    build: .
    container_name: cloud-storage-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloud_storage
      SPRING_DATA_REDIS_HOST: redis
      SPRING_SESSION_REDIS_HOST: redis
      MINIO_URL: http://minio:9000
      TZ: Europe/Moscow
    restart: always

  frontend:
    build: ./frontend
    container_name: cloud-storage-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
volumes:
  postgres_data:
  minio_data: